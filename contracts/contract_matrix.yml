# Contract coverage for the AI Foundry simulator.
# status: supported = the wire contract mirrors the documented Azure surface;
#         adapted   = the wire contract mirrors Azure but the verdict/content
#                     is deterministic simulation (documented per feature).
# tests/test_contract_matrix.py keeps this file and the pytest contract
# markers in lockstep.
version: 1
scope: v0.1
contracts:
  - id: FDY-HEALTH
    status: supported
    surface: simulator
    module: app/routes/management.py
    doc_refs: [docs/SCOPE.md]
    owner_tests: [tests/test_management.py::test_health]
    assertion_kind: http-json

